version: '3.8'

services:
  db:
    image: postgres:15
    container_name: learnlm_postgres
    environment:
      POSTGRES_DB: learnlm_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: